<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Siemens Sinnovation</title>
    <style>
        .button {
            background-color: #4CAF50;
            border-radius: 12px;
            border: none;
            color: white;
            padding: 10px 25px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 18px;
            margin: 4px 2px;
            cursor: pointer;
            box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        }
 
        .button:hover {
            box-shadow: 0 12px 16px 0 rgba(0, 0, 0, 0.24), 0 17px 50px 0 rgba(0, 0, 0, 0.19);
        }
    </style>
</head>
<body style="margin: 0;padding: 0;">
 
 
<table align="center" border="1" cellpadding="0" cellspacing="0" width="600px">
    <tr>
        <td>
            <table align="center" border="0" cellpadding="0" cellspacing="0" width="600"
                   style="border-collapse: collapse;"> 
                <tr>
                    <td bgcolor="#ffffff" style="padding: 0px 30px 20px 30px">
                        <h4 th:text="${subject}"></h4>
                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                           <tr>
                                <td colspan="2" style="padding: 0 0 3px 0">异常类型：<span th:text="${type}"></span></td>
                            </tr>
                            <tr>
                                <td style="padding: 12px 0 3px">发生时间：<span th:text="${currentDate}"></span></td>
                            </tr>
                            <tr>
                                <td style="padding: 12px 0 3px 0">提示内容：<span th:text="${prompt}"></span></td>
                            </tr>
                            <tr>
                                <td style="padding: 12px 0 3px 0">出现次数：<span th:text="${count}"></span></td>
                            </tr>
							 <tr>
								<td style="padding: 12px 0 3px">详细信息：<span th:text="${info}"></span></td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
