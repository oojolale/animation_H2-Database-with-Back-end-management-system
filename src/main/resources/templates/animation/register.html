<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 哈哈动漫网</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px 40px;
            width: 420px;
            max-width: 96vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .subtitle { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 32px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border .2s, box-shadow .2s;
        }
        input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        input::placeholder { color: rgba(255,255,255,0.3); }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            margin-top: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
        .links { text-align: center; margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.5); }
        .links a { color: #a78bfa; text-decoration: none; }
        .links a:hover { color: #ffd700; }
        .msg { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .msg.error { background: rgba(220,53,69,0.2); border: 1px solid rgba(220,53,69,0.4); color: #ff8a9b; }
        .msg.success { background: rgba(76,175,80,0.2); border: 1px solid rgba(76,175,80,0.4); color: #81c784; }
        .tips { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="logo">✨ 哈哈动漫网</div>
        <div class="subtitle">注册账号，享受完整体验</div>

        <div class="msg" id="msg"></div>

        <form id="register-form" onsubmit="return false">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名（3-20个字符）" maxlength="20" autocomplete="username">
                <div class="tips">支持中英文、数字、下划线</div>
            </div>
            <div class="form-group">
                <label>邮箱（选填）</label>
                <input type="email" id="email" placeholder="请输入邮箱地址" autocomplete="email">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码（至少6位）" maxlength="50" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirm-password" placeholder="请再次输入密码" maxlength="50" autocomplete="new-password">
            </div>
            <button class="btn" id="submit-btn" onclick="doRegister()">立即注册</button>
        </form>

        <div class="links">
            已有账号？<a href="/login">立即登录</a>
            &nbsp;|&nbsp;
            <a href="/aaa">返回首页</a>
        </div>
    </div>

    <script>
        async function doRegister() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('submit-btn');

            function showMsg(text, type) {
                msg.textContent = text;
                msg.className = 'msg ' + type;
                msg.style.display = 'block';
            }

            if (!username) { showMsg('请输入用户名', 'error'); return; }
            if (username.length < 3) { showMsg('用户名至少3个字符', 'error'); return; }
            if (!password) { showMsg('请输入密码', 'error'); return; }
            if (password.length < 6) { showMsg('密码至少6位', 'error'); return; }
            if (password !== confirm) { showMsg('两次密码不一致', 'error'); return; }

            btn.disabled = true;
            btn.textContent = '注册中...';
            msg.style.display = 'none';

            try {
                const res = await fetch('/api/anime/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });
                const json = await res.json();
                if (json.code === 200) {
                    showMsg('注册成功！正在跳转到登录页...', 'success');
                    setTimeout(() => window.location.href = '/login', 1800);
                } else {
                    showMsg(json.msg || '注册失败，请重试', 'error');
                }
            } catch(e) {
                showMsg('网络异常，请稍后重试', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '立即注册';
            }
        }

        // 回车提交
        document.addEventListener('keypress', e => { if (e.key === 'Enter') doRegister(); });
    </script>
</body>
</html>
