<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>播放中 - 哈哈动漫网</title>
    <link rel="stylesheet" href="/muiplayer/mui-player/dist/mui-player.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            color: #fff;
            min-width: 320px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* 头部区域 - 与/animation/index.html一致 */
        .header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5), 2px 2px 4px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: #fff;
        }

        .search-box {
            flex: 1;
            max-width: 450px;
            display: flex;
        }

        .search-box input {
            flex: 1;
            padding: 10px 18px;
            border: none;
            border-radius: 25px 0 0 25px;
            outline: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-box button {
            padding: 10px 25px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-radius: 0 25px 25px 0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .search-box button:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        /* 导航 */
        .nav {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(10px);
            overflow-x: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-list {
            display: flex;
            padding: 0 15px;
        }

        .nav-list li {
            flex-shrink: 0;
        }

        .nav-list a {
            display: block;
            padding: 14px 20px;
            color: #ccc;
            transition: all 0.3s;
            white-space: nowrap;
            position: relative;
        }

        .nav-list a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: all 0.3s;
            transform: translateX(-50%);
        }

        .nav-list a:hover::after,
        .nav-list a.active::after {
            width: 80%;
        }

        .nav-list a:hover {
            color: #ffd700;
        }

        .nav-list a.active {
            color: #ffd700;
        }

        /* 播放页面样式 */
        .player-container {
            padding: 20px 0 50px;
        }

        .breadcrumb {
            margin-bottom: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .breadcrumb a {
            color: #667eea;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            margin: 0 8px;
        }

        .player-main {
            display: flex;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .player-main {
                flex-direction: column;
            }
        }

        .player-left {
            flex: 1;
        }

        .player-right {
            width: 350px;
            flex-shrink: 0;
        }

        @media (max-width: 992px) {
            .player-right {
                width: 100%;
            }
        }

        /* 视频播放器 */
        .video-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .video-player {
            width: 100%;
            background: #000;
            position: relative;
        }

        /* 播放进度显示 */
        .play-progress {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-bar {
            flex: 1;
            margin: 0 20px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .progress-time {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            min-width: 100px;
        }

        .progress-time span {
            margin: 0 5px;
        }

        /* 当前播放信息 */
        .current-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .current-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffd700;
        }

        .current-episode {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
        }

        .current-actions {
            display: flex;
            gap: 10px;
        }

        .current-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .current-btn.prev {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .current-btn.next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .current-btn:hover {
            transform: translateY(-2px);
        }

        /* 选集列表 */
        .episode-list {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 500px;
            overflow-y: auto;
        }

        .episode-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .episode-list-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }

        .episode-search {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            width: 150px;
            font-size: 12px;
        }

        .episode-search::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .episode-scroll {
            max-height: 400px;
            overflow-y: auto;
        }

        .episode-item {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .episode-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .episode-item.current {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-left: 3px solid #667eea;
        }

        .episode-number {
            font-weight: 500;
        }

        .episode-duration {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* 动漫信息侧边栏 */
        .anime-sidebar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .anime-sidebar-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .anime-sidebar-cover {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .anime-sidebar-info {
            margin-bottom: 15px;
        }

        .anime-sidebar-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .info-value {
            color: rgba(255, 255, 255, 0.9);
        }

        .sidebar-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .sidebar-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* 评论区域 */
        .comments-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .comments-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .comment-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .comment-input textarea {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
        }

        .comment-input textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .comment-submit {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            align-self: flex-start;
        }

        .comment-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .comment-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .comment-item {
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .comment-user {
            font-weight: 500;
            color: #ffd700;
        }

        .comment-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .comment-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .video-player {
                height: 300px;
            }

            .episode-list-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .episode-search {
                width: 100%;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        /* 隐藏播放器内部的返回按钮 */
        #mui-player #back-button,
        #mui-player .back-button,
        #mui-player .header-control.back-button,
        #mui-player #title-groupt {
            display: none !important;
        }
    </style>
</head>

<!-- 播放页面内容 -->
<div class="container player-container">
    <!-- 面包屑导航 -->
    <div class="breadcrumb">
        <a href="/animation/index.html">首页</a>
        <span>&gt;</span>
        <a href="/animation/japanese.html" id="breadcrumb-type-link">日本动漫</a>

    <div class="player-main">
        <!-- 左侧：视频播放器和选集 -->

            <!-- 视频播放器 -->
            <div class="video-container">
                <div class="video-player" id="mui-player"></div>

            <!-- 播放进度显示 -->
            <div class="play-progress" style="display: none">
                <div class="progress-time">
                    <span id="currentTime">00:00</span>

            <div class="current-info">

                <div class="current-actions">
                    <button class="current-btn prev" onclick="playPrevEpisode()">◀ 上一集</button>

            <!-- 选集列表 -->

                <div class="episode-scroll" id="episodeScroll">

                </div>
                <div class="anime-sidebar-cover" id="sidebar-cover"></div>
                <div class="anime-sidebar-info">
                    <div class="anime-sidebar-info-item">
                        <span class="info-label">名称：</span>
                        <span class="info-value" id="sidebar-title">海贼王 One Piece</span>
                    </div>
                    <div class="anime-sidebar-info-item">

                    <div class="anime-sidebar-info-item">

<script src="/muiplayer/mui-player/dist/mui-player.min.js"></script>

<script>
    // MuiPlayer 实例
    let muiPlayer = null;

    // 播放器状态
    let isPlaying = false;
    let currentTime = 0;
    let totalTime = 1470; // 24分30秒 = 1470秒
    let volume = 0.7;
    let isMuted = false;
    let currentEpisode = 1100;

    // 初始化 MuiPlayer
    function initMuiPlayer(videoUrl) {
        const actualVideoUrl = videoUrl || '/课时114：火焰的做法.mp4';
        console.log('初始化播放器，视频 URL:', actualVideoUrl);

        const config = {
            container: '#mui-player',
            src: actualVideoUrl,

    // 从API加载动漫数据用于播放器（通过ID）
    async function loadAnimeDataForPlayer(animeId, ep, videoUrl) {
        try {
            const res = await fetch(`/api/anime/detail/${animeId}`);
            const json = await res.json();
            if (json.code !== 200 || !json.data) return;
            const d = json.data;

            updateAnimeInfo(d, animeId, ep, videoUrl);
        } catch(e) {
            console.log('加载播放器数据失败', e);
            // 加载失败时设置默认值
            updateAnimeInfoDefault();
        }
    }

    // 从API加载动漫数据用于播放器（通过标题）
    async function loadAnimeDataByTitle(animeTitle, ep, videoUrl) {
        try {
            const res = await fetch(`/api/anime/detail?title=${encodeURIComponent(animeTitle)}`);
            const json = await res.json();

            if (json.code !== 200) {
                console.log('API返回错误:', json.message);
                // API返回错误，尝试搜索动漫基本信息
                await loadAnimeBasicInfo(animeTitle, ep);
                return;
            }

            const d = json.data;
            if (!d) {
                console.log('没有找到动漫数据，尝试搜索基本信息');
                // 没有数据，尝试搜索动漫基本信息
                await loadAnimeBasicInfo(animeTitle, ep);
                return;
            }

            // 如果返回的数据有id，使用id；否则使用title
            const animeId = d.id || d.animeId;
            updateAnimeInfo(d, animeId, ep, videoUrl);
        } catch(e) {
            console.log('加载播放器数据失败', e);
            // 加载失败时，尝试搜索动漫基本信息
            await loadAnimeBasicInfo(animeTitle, ep);
        }
    }

    // 加载动漫基本信息（当详情加载失败时）
    async function loadAnimeBasicInfo(animeTitle, ep) {
        try {
            // 尝试通过搜索API获取动漫基本信息
            const res = await fetch(`/api/anime/search?keyword=${encodeURIComponent(animeTitle)}&page=1&size=1`);
            const json = await res.json();

            if (json.code === 200 && json.data && json.data.records && json.data.records.length > 0) {
                const anime = json.data.records[0];
                // 构造一个类似AnimeDetail的对象
                const detail = {
                    id: anime.id,
                    title: anime.title,
                    type: anime.type,
                    coverImage: anime.coverImage,
                    rating: anime.rating,
                    status: anime.status,
                    tags: anime.tags,
                    totalEpisodes: anime.totalEpisodes || 0,
                    viewCount: anime.viewCount
                };
                updateAnimeInfo(detail, anime.id, ep, null);
            } else {
                // 搜索也失败，设置默认值
                updateAnimeInfoDefault(animeTitle);
            }
        } catch(e) {
            console.log('搜索动漫基本信息失败', e);
            updateAnimeInfoDefault(animeTitle);
        }
    }

    function playEpisodeUrl(ep, url) {
        const urlParams = new URLSearchParams(window.location.search);
        const animeId = urlParams.get('id');
        const animeTitle = urlParams.get('anime');

        // 更新当前集数
        currentEpisode = ep;

        // 更新当前播放信息
        updateCurrentEpisodeInfo();

        // 更新面包屑导航中的集数
        const breadcrumbEpisode = document.getElementById('breadcrumb-episode');
        if (breadcrumbEpisode) {
            breadcrumbEpisode.textContent = `第${ep}集 播放中`;
        }

        // 手动更新剧集列表的高亮状态（直接操作DOM）
        const episodeItems = document.querySelectorAll('.episode-item');
        episodeItems.forEach(item => {
            item.classList.remove('current');
            const numberText = item.querySelector('.episode-number')?.textContent;
            if (numberText && numberText === `第${ep}集`) {
                item.classList.add('current');
            }
        });

        // 更新 URL 参数（无论是否有视频URL都要更新）
        const newUrl = new URL(window.location);
        // 删除可能存在的 ep/url 参数
        newUrl.searchParams.delete('ep');
        newUrl.searchParams.delete('url');
        // 根据原始URL使用的是 id 还是 anime 来决定如何更新
        if (animeTitle) {
            newUrl.searchParams.set('episode', ep);
        } else if (animeId) {
            newUrl.searchParams.set('ep', ep);
        } else {
            newUrl.searchParams.set('episode', ep);
        }
        window.history.replaceState({}, '', newUrl);

        // 如果有 MuiPlayer 实例，直接切换视频
        if (muiPlayer && url) {
            const video = muiPlayer.video();
            if (video) {
                video.src = url;
                video.play();
            }

            // 更新播放器标题和UI
            const currentTitleEl = document.getElementById('page-title');
            if (currentTitleEl) {
                const animeTitleFromEl = currentTitleEl.textContent;
                const playerTitle = `${animeTitleFromEl} 第${ep}集`;
                muiPlayer.config.title = playerTitle;
                updatePlayerUI(playerTitle);
            }

            showToast(`正在播放第${ep}集`);
        } else {
            // 否则刷新页面
            if (animeTitle) {
                window.location.href = `/animation/player.html?anime=${encodeURIComponent(animeTitle)}&episode=${ep}`;
            } else {
                window.location.href = `/animation/player.html?id=${animeId}&ep=${ep}`;
            }
        }
    }

    // 格式化时间
    function formatTime(timeStr) {
        if (!timeStr) return '未知时间';
        const date = new Date(timeStr);
        const now = new Date();
        const diff = now - date;
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);

        if (minutes < 1) return '刚刚';
        if (minutes < 60) return `${minutes}分钟前`;
        if (hours < 24) return `${hours}小时前`;
        if (days < 30) return `${days}天前`;
        return date.toLocaleDateString('zh-CN');
    }

        if (!episodes || episodes.length === 0) {
            episodeScroll.innerHTML = '<div style="padding: 30px; text-align: center; color: rgba(255,255,255,0.5);">暂无剧集数据</div>';
            return;
        }

        episodes.forEach(episode => {
            const episodeItem = document.createElement('div');
            episodeItem.className = `episode-item ${episode.current ? 'current' : ''}`;
            episodeItem.onclick = () => playEpisode(episode.number);

            episodeItem.innerHTML = `
                    <div class="episode-number">第${episode.number}集</div>
                    <div class="episode-duration">${episode.duration}分钟</div>
                `;

            episodeScroll.appendChild(episodeItem);
        });
    }

    // 搜索剧集
    function searchEpisodes(query) {
        // 如果没有剧集数据，不执行搜索
        if (!episodes || episodes.length === 0) {
            return;
        }

        const filteredEpisodes = episodes.filter(ep =>
            ep.number.toString().includes(query) ||
            getEpisodeTitle(ep.number).includes(query)
        );

        const episodeScroll = document.getElementById('episodeScroll');
        episodeScroll.innerHTML = '';

        if (filteredEpisodes.length === 0) {
            episodeScroll.innerHTML = '<div style="padding: 30px; text-align: center; color: rgba(255,255,255,0.5);">未找到匹配的剧集</div>';
            return;
        }

        filteredEpisodes.forEach(episode => {
            const episodeItem = document.createElement('div');
            episodeItem.className = `episode-item ${episode.current ? 'current' : ''}`;
            episodeItem.onclick = () => playEpisode(episode.number);

            episodeItem.innerHTML = `
                    <div class="episode-number">第${episode.number}集</div>
                    <div class="episode-duration">${episode.duration}分钟</div>
                `;

            episodeScroll.appendChild(episodeItem);
        });
    }

    // 播放剧集
    function playEpisode(episodeNumber) {
        // 检查当前是否是从API加载的剧集列表
        const episodeItems = document.querySelectorAll('.episode-item');
        let episodeTitle = `第${episodeNumber}集`;
        let episodeUrl = null;

        // 尝试从DOM中获取剧集标题和URL
        episodeItems.forEach(item => {
            const numberText = item.querySelector('.episode-number')?.textContent;
            const durationText = item.querySelector('.episode-duration')?.textContent;
            if (numberText === `第${episodeNumber}集`) {
                if (durationText && durationText !== `${Math.floor(Math.random() * 5) + 20}分钟`) {
                    episodeTitle = durationText;
                }
                // 尝试从onclick属性获取URL
                const onclickAttr = item.getAttribute('onclick');
                if (onclickAttr) {
                    const urlMatch = onclickAttr.match(/'([^']+)'/);
                    if (urlMatch && urlMatch[1]) {
                        episodeUrl = urlMatch[1];
                    }
                }
            }
        });

        currentEpisode = episodeNumber;
        updateCurrentEpisodeInfo();

        // 手动更新剧集列表的高亮状态（直接操作DOM）
        episodeItems.forEach(item => {
            item.classList.remove('current');
            const numberText = item.querySelector('.episode-number')?.textContent;
            if (numberText && numberText === `第${episodeNumber}集`) {
                item.classList.add('current');
            }
        });

        // 重置播放器
        currentTime = 0;
        isPlaying = true;
        updateTimeDisplay();
        updateProgressBar();

        // 显示播放提示
        showToast(`开始播放第${episodeNumber}集`);

        // 更新URL参数（无论是否有视频URL都要更新）
        const urlParams = new URLSearchParams(window.location.search);
        const animeId = urlParams.get('id');
        const animeTitleParam = urlParams.get('anime');

        const newUrl = new URL(window.location);
        // 删除可能存在的 ep/url 参数
        newUrl.searchParams.delete('ep');
        newUrl.searchParams.delete('url');
        // 根据原始URL使用的是 id 还是 anime 来决定如何更新
        if (animeTitleParam) {
            newUrl.searchParams.set('episode', episodeNumber);
        } else if (animeId) {
            newUrl.searchParams.set('ep', episodeNumber);
        } else {
            newUrl.searchParams.set('episode', episodeNumber);
        }
        window.history.replaceState({}, '', newUrl);

        // 如果有URL且有播放器，切换视频
        if (episodeUrl && muiPlayer) {
            const video = muiPlayer.video();
            if (video) {
                video.src = episodeUrl;
                video.play();
            }

            // 更新播放器标题和UI
            const currentTitleEl = document.getElementById('page-title');
            if (currentTitleEl) {
                const animeTitle = currentTitleEl.textContent;
                const playerTitle = `${animeTitle} 第${episodeNumber}集`;
                muiPlayer.config.title = playerTitle;
                updatePlayerUI(playerTitle);
            }
        }
    }

    // 播放其他动漫
    function playAnime(animeName, episodeNumber) {
        showToast(`正在打开${animeName}第${episodeNumber}集...`);
        setTimeout(() => {
            window.location.href = `/anime/player?title=${encodeURIComponent(animeName)}&ep=${episodeNumber}`;
        }, 500);
    }

    // 更新当前剧集信息
    function updateCurrentEpisodeInfo() {
        const episodeTitle = document.getElementById('page-episode');
        if (episodeTitle) {
            episodeTitle.textContent = `第${currentEpisode}集 · 播放中`;
        }

        // 更新面包屑中的集数
        const breadcrumbEpisode = document.getElementById('breadcrumb-episode');
        if (breadcrumbEpisode) {
            breadcrumbEpisode.textContent = `第${currentEpisode}集 播放中`;
        }

        // 从URL获取动漫标题（如果已加载）
        const currentTitleEl = document.getElementById('page-title');
        if (currentTitleEl && currentTitleEl.textContent && currentTitleEl.textContent !== '加载中...') {
            // 如果已经从API加载了动漫信息，不修改标题
            document.title = `播放中 - ${currentTitleEl.textContent}第${currentEpisode}集 - 哈哈动漫网`;
        }
    }

    // 高亮当前剧集
    function highlightCurrentEpisode() {
        // 如果没有剧集数据，不执行
        if (!episodes || episodes.length === 0) {
            return;
        }

        document.querySelectorAll('.episode-item').forEach(item => {
            item.classList.remove('current');
        });

        // 更新剧集数据中的当前状态
        episodes.forEach(ep => {
            ep.current = ep.number === currentEpisode;
        });

        // 重新生成列表以反映更改
        generateEpisodeList();
    }

    // 播放/暂停
    function togglePlay() {
        if (muiPlayer) {
            const video = muiPlayer.video();
            if (video) {
                if (video.paused) {
                    video.play();
                    showToast('继续播放');
                } else {
                    video.pause();
                    showToast('已暂停');
                }
            }
        }
    }

    // 快退
    function skipBackward() {
        if (muiPlayer) {
            const video = muiPlayer.video();
            if (video) {
                video.currentTime = Math.max(0, video.currentTime - 10);
                showToast('快退10秒');
            }
        }
    }

    // 快进
    function skipForward() {
        if (muiPlayer) {
            const video = muiPlayer.video();
            if (video) {
                video.currentTime = Math.min(video.duration, video.currentTime + 10);
                showToast('快进10秒');
            }
        }
    }

    // 播放上一集
    function playPrevEpisode() {
        const prevEpisode = currentEpisode - 1;
        if (prevEpisode >= 1) {
            // 检查是否还有上一集（从剧集列表中查找）
            const episodeItems = document.querySelectorAll('.episode-item');
            let hasPrevEpisode = false;
            episodeItems.forEach(item => {
                const numberText = item.querySelector('.episode-number')?.textContent;
                if (numberText === `第${prevEpisode}集`) {
                    hasPrevEpisode = true;
                }
            });

            if (hasPrevEpisode) {
                playEpisode(prevEpisode);
            } else {
                showToast('已经是第一集了');
            }
        } else {
            showToast('已经是第一集了');
        }
    }

    // 播放下一集
    function playNextEpisode() {
        const nextEpisode = currentEpisode + 1;
        // 检查是否还有下一集（从剧集列表中查找）
        const episodeItems = document.querySelectorAll('.episode-item');
        let hasNextEpisode = false;
        episodeItems.forEach(item => {
            const numberText = item.querySelector('.episode-number')?.textContent;
            if (numberText === `第${nextEpisode}集`) {
                hasNextEpisode = true;
            }
        });

        if (hasNextEpisode) {
            playEpisode(nextEpisode);
        } else {
            showToast('已经是最新一集了');
        }
    }

    // 更新进度条
    function updateProgressBar() {
        const progressFill = document.getElementById('progressFill');
        if (progressFill && totalTime > 0) {
            const percentage = (currentTime / totalTime) * 100;
            progressFill.style.width = `${percentage}%`;
        }
    }

    // 点击进度条跳转
    document.getElementById('progressBar').addEventListener('click', function(e) {
        if (muiPlayer) {
            const video = muiPlayer.video();
            if (video) {
                const rect = this.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const percentage = clickX / rect.width;
                video.currentTime = percentage * video.duration;
                showToast(`跳转到 ${formatTime(video.currentTime)}`);
            }
        }
    });

    // 更新时间显示
    function updateTimeDisplay() {
        const currentTimeEl = document.getElementById('currentTime');
        if (currentTimeEl) {
            currentTimeEl.textContent = formatTime(currentTime);
        }
    }

    // 格式化时间 (秒 -> MM:SS)
    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    // 提交评论
    function submitComment() {
        const textarea = document.querySelector('.comment-input textarea');
        const comment = textarea.value.trim();

        if (!comment) {
            showToast('请输入评论内容');
            return;
        }

        // 在实际应用中，这里会发送AJAX请求保存评论
        showToast('评论发表成功！');
        textarea.value = '';

        // 模拟添加新评论到列表顶部
        const commentList = document.querySelector('.comment-list');
        const newComment = document.createElement('div');
        newComment.className = 'comment-item';
        newComment.innerHTML = `
                <div class="comment-header">
                    <div class="comment-avatar"></div>
                    <div>
                        <div class="comment-user">我</div>
                        <div class="comment-time">刚刚</div>
                    </div>
                </div>
                <div class="comment-content">${comment}</div>
            `;

        commentList.insertBefore(newComment, commentList.firstChild);
    }

    // Toast提示
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        toast.style.cssText = `
                position: fixed;
                top: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 25px;
                z-index: 10000;
                animation: fadeInOut 2s ease-in-out;
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            `;

        document.body.appendChild(toast);

        setTimeout(() => {
            toast.remove();
        }, 2000);
    }

    // 添加CSS动画
    const style = document.createElement('style');
    style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
                20% { opacity: 1; transform: translateX(-50%) translateY(0); }
                80% { opacity: 1; transform: translateX(-50%) translateY(0); }
                100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            }

            .recommend-sidebar-item {
                padding: 10px;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.3s;
            }

            .recommend-sidebar-item:hover {
                background: rgba(255, 255, 255, 0.1);
                transform: translateX(5px);
            }
        `;
    document.head.appendChild(style);

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
