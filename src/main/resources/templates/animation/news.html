<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>动漫资讯 - 哈哈动漫网</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            color: #fff;
            min-width: 320px;
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 15px; }
        
        .header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .logo { font-size: 26px; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); white-space: nowrap; display: flex; align-items: center; gap: 8px; }
        .logo span { color: #fff; }
        .search-box { flex: 1; max-width: 450px; display: flex; }
        .search-box input { flex: 1; padding: 10px 18px; border: none; border-radius: 25px 0 0 25px; outline: none; font-size: 14px; background: rgba(255, 255, 255, 0.15); color: #fff; }
        .search-box input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .search-box button { padding: 10px 25px; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-radius: 0 25px 25px 0; cursor: pointer; font-size: 14px; transition: all 0.3s; font-weight: 500; }
        .search-box button:hover { background: linear-gradient(135deg, #764ba2, #667eea); transform: translateY(-2px); }
        
        .nav { background: rgba(15, 15, 35, 0.95); backdrop-filter: blur(10px); overflow-x: auto; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-list { display: flex; padding: 0 15px; }
        .nav-list li { flex-shrink: 0; }
        .nav-list a { display: block; padding: 14px 20px; color: #ccc; transition: all 0.3s; white-space: nowrap; }
        .nav-list a:hover { color: #ffd700; }
        .nav-list a.active { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        
        .page-header { padding: 35px 0 25px; background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2)); backdrop-filter: blur(10px); margin-bottom: 30px; border-radius: 15px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); }
        .page-header h1 { font-size: 36px; color: #ffd700; margin-bottom: 12px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
        
        .main-content { display: flex; gap: 30px; }
        .news-main { flex: 1; }
        .news-sidebar { width: 320px; }
        
        .news-tabs { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .news-tab { padding: 12px 24px; background: rgba(22, 33, 62, 0.8); border-radius: 25px; cursor: pointer; transition: all 0.3s; border: 2px solid rgba(102, 126, 234, 0.3); font-size: 14px; }
        .news-tab:hover { background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3)); border-color: #ffd700; }
        .news-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: #ffd700; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
        
        .news-list { display: flex; flex-direction: column; gap: 20px; }
        .news-item { display: flex; background: rgba(22, 33, 62, 0.6); backdrop-filter: blur(10px); border-radius: 12px; overflow: hidden; transition: all 0.3s; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); }
        .news-item:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3); }
        
        .news-cover { width: 200px; height: 140px; overflow: hidden; background: rgba(102, 126, 234, 0.3); flex-shrink: 0; }
        .news-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .news-item:hover .news-cover img { transform: scale(1.05); }
        
        .news-content { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .news-title { font-size: 18px; font-weight: 600; margin-bottom: 10px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-summary { font-size: 14px; color: rgba(255, 255, 255, 0.7); line-height: 1.6; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; }
        .news-meta { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255, 255, 255, 0.5); }
        .news-category { padding: 4px 10px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; font-size: 12px; }
        
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 30px; }
        .pagination-item { padding: 10px 16px; background: rgba(22, 33, 62, 0.8); border-radius: 8px; cursor: pointer; transition: all 0.3s; border: 1px solid rgba(102, 126, 234, 0.2); }
        .pagination-item:hover { background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3)); }
        .pagination-item.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: #ffd700; }
        .pagination-item.disabled { opacity: 0.4; cursor: not-allowed; }
        
        .sidebar-section { background: rgba(22, 33, 62, 0.6); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-title { font-size: 18px; color: #ffd700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid rgba(102, 126, 234, 0.5); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        
        .hot-news-item { padding: 15px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; transition: all 0.3s; }
        .hot-news-item:hover { background: rgba(102, 126, 234, 0.1); margin: 0 -15px; padding: 15px; }
        .hot-news-item:last-child { border-bottom: none; }
        .hot-news-title { font-size: 14px; font-weight: 500; line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hot-news-meta { font-size: 12px; color: rgba(255, 255, 255, 0.5); display: flex; gap: 15px; }
        
        .footer { background: rgba(15, 15, 26, 0.95); padding: 40px 0 25px; margin-top: 50px; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .footer-content { text-align: center; }
        .footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 25px; margin-bottom: 25px; }
        .footer-links a { color: rgba(255, 255, 255, 0.6); font-size: 14px; }
        .footer-links a:hover { color: #ffd700; }
        .footer p { color: rgba(255, 255, 255, 0.4); font-size: 13px; margin-bottom: 10px; }
        
        @media (max-width: 1024px) { .main-content { flex-direction: column; } .news-sidebar { width: 100%; } }
        @media (max-width: 768px) { .news-item { flex-direction: column; } .news-cover { width: 100%; height: 180px; } }
        @media (max-width: 480px) { .news-tabs { gap: 10px; } .news-tab { padding: 10px 16px; font-size: 13px; } }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: rgba(15, 15, 35, 0.8); } ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 4px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <a href="/aaa" class="logo">🎬 哈哈<span>动漫</span></a>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索资讯...">
                    <button onclick="doSearch()">搜索</button>
                </div>
            </div>
        </div>
    </header>
    
    <nav class="nav">
        <ul class="nav-list container">
            <li><a href="/aaa">首页</a></li>
            <li><a href="/anime/japanese">日本动漫</a></li>
            <li><a href="/anime/chinese">国产动漫</a></li>
            <li><a href="/anime/news" class="active">资讯</a></li>
            <li><a href="/anime/rankings">排行榜</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h1>📰 动漫资讯</h1>
        </div>
        
        <div class="main-content">
            <div class="news-main">
                <div class="news-tabs">
                    <span class="news-tab active" data-category="" onclick="switchCategory('')">全部</span>
                    <span class="news-tab" data-category="新番资讯" onclick="switchCategory('新番资讯')">新番资讯</span>
                    <span class="news-tab" data-category="声优消息" onclick="switchCategory('声优消息')">声优消息</span>
                    <span class="news-tab" data-category="制作动态" onclick="switchCategory('制作动态')">制作动态</span>
                    <span class="news-tab" data-category="周边情报" onclick="switchCategory('周边情报')">周边情报</span>
                </div>
                
                <div class="news-list" id="newsList">
                    <div style="text-align:center;padding:60px;color:rgba(255,255,255,0.4)">加载中...</div>
                </div>
                
                <div class="pagination" id="pagination"></div>
            </div>
            
            <div class="news-sidebar">
                <div class="sidebar-section">
                    <h3 class="sidebar-title">🔥 热门资讯</h3>
                    <div id="hotNews"></div>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="/aaa">首页</a>
                    <a href="/anime/japanese">日本动漫</a>
                    <a href="/anime/rankings">排行榜</a>
                </div>
                <p>哈哈动漫网 - 免费高清动漫在线观看</p>
                <p style="color:rgba(255,255,255,0.3)">© 2024 hahaAnimation. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <script>
        let currentCategory = '';
        let currentPage = 1;
        let totalPages = 1;
        
        async function loadNews(page) {
            page = page || 1;
            currentPage = page;
            const list = document.getElementById('newsList');
            const params = new URLSearchParams({ page, size: 10 });
            if (currentCategory) params.set('category', currentCategory);
            
            try {
                const res = await fetch('/api/anime/news?' + params);
                const json = await res.json();
                if (json.code === 200 && json.data) {
                    totalPages = json.data.pages;
                    renderNews(list, json.data.records);
                    renderPagination();
                }
            } catch(e) { list.innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.4)">加载失败</div>'; }
        }
        
        function renderNews(container, records) {
            if (!records || !records.length) {
                container.innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.4)">暂无资讯</div>';
                return;
            }
            container.innerHTML = records.map(news => `
                <div class="news-item" onclick="window.location.href='/anime/news/detail?id=${news.id}'">
                    <div class="news-cover">
                        <img src="${news.coverImage || ''}" onerror="this.parentElement.style.background='linear-gradient(135deg,#667eea,#764ba2)'">
                    </div>
                    <div class="news-content">
                        <h3 class="news-title">${news.title}</h3>
                        <p class="news-summary">${news.summary || news.content || ''}</p>
                        <div class="news-meta">
                            <span class="news-category">${news.category || '资讯'}</span>
                            <span>${formatDate(news.publishTime)}</span>
                            <span>👁 ${formatCount(news.viewCount)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderPagination() {
            const pg = document.getElementById('pagination');
            if (!pg || totalPages <= 1) return;
            let html = `<span class="pagination-item ${currentPage<=1?'disabled':''}" onclick="${currentPage>1?'loadNews('+(currentPage-1)+')':''}">‹</span>`;
            for (let i = Math.max(1,currentPage-2); i <= Math.min(totalPages,currentPage+2); i++) {
                html += `<span class="pagination-item ${i===currentPage?'active':''}" onclick="loadNews(${i})">${i}</span>`;
            }
            html += `<span class="pagination-item ${currentPage>=totalPages?'disabled':''}" onclick="${currentPage<totalPages?'loadNews('+(currentPage+1)+')':''}">›</span>`;
            pg.innerHTML = html;
        }
        
        async function loadHotNews() {
            try {
                const res = await fetch('/api/anime/news?page=1&size=5');
                const json = await res.json();
                if (json.code === 200 && json.data) {
                    const container = document.getElementById('hotNews');
                    container.innerHTML = json.data.records.map(news => `
                        <div class="hot-news-item" onclick="window.location.href='/anime/news/detail?id=${news.id}'">
                            <div class="hot-news-title">${news.title}</div>
                            <div class="hot-news-meta">
                                <span>${news.category || '资讯'}</span>
                                <span>👁 ${formatCount(news.viewCount)}</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch(e) { console.log('热门资讯加载失败'); }
        }
        
        function switchCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.news-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.category === cat);
            });
            loadNews(1);
        }
        
        function formatCount(n) {
            if (!n) return '0';
            if (n >= 10000) return (n/10000).toFixed(1)+'万';
            return String(n);
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        
        function doSearch() {
            const kw = document.getElementById('searchInput').value.trim();
            if (!kw) return;
            window.location.href = '/anime/search?keyword=' + encodeURIComponent(kw);
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') doSearch(); });
        
        loadNews();
        loadHotNews();
    </script>
</body>
</html>
