<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>动漫排行榜 - 哈哈动漫网</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            color: #fff;
            min-width: 320px;
        }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 15px; }
        
        .header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .logo { font-size: 26px; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); white-space: nowrap; display: flex; align-items: center; gap: 8px; }
        .logo span { color: #fff; }
        .search-box { flex: 1; max-width: 450px; display: flex; }
        .search-box input { flex: 1; padding: 10px 18px; border: none; border-radius: 25px 0 0 25px; outline: none; font-size: 14px; background: rgba(255, 255, 255, 0.15); color: #fff; }
        .search-box input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .search-box button { padding: 10px 25px; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-radius: 0 25px 25px 0; cursor: pointer; font-size: 14px; transition: all 0.3s; font-weight: 500; }
        .search-box button:hover { background: linear-gradient(135deg, #764ba2, #667eea); transform: translateY(-2px); }
        
        .nav { background: rgba(15, 15, 35, 0.95); backdrop-filter: blur(10px); overflow-x: auto; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-list { display: flex; padding: 0 15px; }
        .nav-list li { flex-shrink: 0; }
        .nav-list a { display: block; padding: 14px 20px; color: #ccc; transition: all 0.3s; white-space: nowrap; }
        .nav-list a:hover { color: #ffd700; }
        .nav-list a.active { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        
        .page-header { padding: 35px 0 25px; background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2)); backdrop-filter: blur(10px); margin-bottom: 30px; border-radius: 15px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); }
        .page-header h1 { font-size: 36px; color: #ffd700; margin-bottom: 12px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
        
        .main-content { display: flex; gap: 30px; }
        .ranking-main { flex: 1; }
        .ranking-sidebar { width: 300px; }
        
        .ranking-tabs { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .ranking-tab { padding: 12px 24px; background: rgba(22, 33, 62, 0.8); border-radius: 25px; cursor: pointer; transition: all 0.3s; border: 2px solid rgba(102, 126, 234, 0.3); font-size: 14px; }
        .ranking-tab:hover { background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3)); border-color: #ffd700; }
        .ranking-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: #ffd700; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
        
        .ranking-list { background: rgba(22, 33, 62, 0.6); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .ranking-item { display: flex; align-items: center; padding: 15px; margin-bottom: 10px; background: rgba(15, 52, 96, 0.4); border-radius: 10px; transition: all 0.3s; cursor: pointer; }
        .ranking-item:hover { background: rgba(102, 126, 234, 0.2); transform: translateX(5px); }
        .ranking-item:last-child { margin-bottom: 0; }
        
        .rank-number { font-size: 28px; font-weight: bold; width: 50px; text-align: center; }
        .rank-1 { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .rank-2 { color: #c0c0c0; text-shadow: 0 0 10px rgba(192, 192, 192, 0.5); }
        .rank-3 { color: #cd7f32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }
        .rank-default { color: rgba(255, 255, 255, 0.5); }
        
        .rank-cover { width: 60px; height: 80px; border-radius: 6px; overflow: hidden; margin: 0 15px; background: rgba(102, 126, 234, 0.3); }
        .rank-cover img { width: 100%; height: 100%; object-fit: cover; }
        
        .rank-info { flex: 1; }
        .rank-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rank-meta { display: flex; gap: 20px; font-size: 13px; color: rgba(255, 255, 255, 0.6); }
        .rank-score { color: #ffd700; font-weight: bold; font-size: 18px; }
        
        .sidebar-section { background: rgba(22, 33, 62, 0.6); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-title { font-size: 18px; color: #ffd700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid rgba(102, 126, 234, 0.5); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        
        .sidebar-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; transition: all 0.3s; }
        .sidebar-item:hover { background: rgba(102, 126, 234, 0.1); margin: 0 -15px; padding: 12px 15px; }
        .sidebar-item:last-child { border-bottom: none; }
        .sidebar-rank { font-size: 20px; font-weight: bold; width: 30px; color: #ffd700; }
        .sidebar-cover { width: 45px; height: 60px; border-radius: 4px; margin: 0 12px; overflow: hidden; background: rgba(102, 126, 234, 0.3); }
        .sidebar-cover img { width: 100%; height: 100%; object-fit: cover; }
        .sidebar-info { flex: 1; }
        .sidebar-title-text { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-meta { font-size: 12px; color: rgba(255, 255, 255, 0.5); }
        
        .footer { background: rgba(15, 15, 26, 0.95); padding: 40px 0 25px; margin-top: 50px; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .footer-content { text-align: center; }
        .footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 25px; margin-bottom: 25px; }
        .footer-links a { color: rgba(255, 255, 255, 0.6); font-size: 14px; }
        .footer-links a:hover { color: #ffd700; }
        .footer p { color: rgba(255, 255, 255, 0.4); font-size: 13px; margin-bottom: 10px; }
        
        @media (max-width: 1024px) { .main-content { flex-direction: column; } .ranking-sidebar { width: 100%; } }
        @media (max-width: 768px) { .ranking-tabs { gap: 10px; } .ranking-tab { padding: 10px 18px; font-size: 13px; } }
        @media (max-width: 480px) { .rank-cover { width: 50px; height: 65px; } .rank-info { min-width: 0; } }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: rgba(15, 15, 35, 0.8); } ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 4px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <a href="/aaa" class="logo">🎬 哈哈<span>动漫</span></a>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索动漫...">
                    <button onclick="doSearch()">搜索</button>
                </div>
            </div>
        </div>
    </header>
    
    <nav class="nav">
        <ul class="nav-list container">
            <li><a href="/aaa">首页</a></li>
            <li><a href="/anime/japanese">日本动漫</a></li>
            <li><a href="/anime/chinese">国产动漫</a></li>
            <li><a href="/anime/western">欧美动漫</a></li>
            <li><a href="/anime/movies">电影</a></li>
            <li><a href="/anime/tv">TV动画</a></li>
            <li><a href="/anime/news">资讯</a></li>
            <li><a href="/anime/rankings" class="active">排行榜</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h1>🏆 动漫排行榜</h1>
        </div>
        
        <div class="main-content">
            <div class="ranking-main">
                <div class="ranking-tabs">
                    <span class="ranking-tab active" data-type="" onclick="switchType('')">全部</span>
                    <span class="ranking-tab" data-type="日本" onclick="switchType('日本')">日本动漫</span>
                    <span class="ranking-tab" data-type="国产" onclick="switchType('国产')">国产动漫</span>
                    <span class="ranking-tab" data-type="欧美" onclick="switchType('欧美')">欧美动漫</span>
                </div>
                
                <div class="ranking-list" id="rankingList">
                    <div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4)">加载中...</div>
                </div>
            </div>
            
            <div class="ranking-sidebar">
                <div class="sidebar-section">
                    <h3 class="sidebar-title">🔥 日漫TOP3</h3>
                    <div id="japaneseTop"></div>
                </div>
                
                <div class="sidebar-section">
                    <h3 class="sidebar-title">🎋 国漫TOP3</h3>
                    <div id="chineseTop"></div>
                </div>
                
                <div class="sidebar-section">
                    <h3 class="sidebar-title">🌟 欧美TOP3</h3>
                    <div id="westernTop"></div>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="/aaa">首页</a>
                    <a href="/anime/japanese">日本动漫</a>
                    <a href="/anime/news">资讯</a>
                </div>
                <p>哈哈动漫网 - 免费高清动漫在线观看</p>
                <p style="color:rgba(255,255,255,0.3)">© 2024 hahaAnimation. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <script>
        let currentType = '';
        
        async function loadRanking() {
            const list = document.getElementById('rankingList');
            const params = new URLSearchParams({ sortBy: 'rating', limit: 20 });
            if (currentType) params.set('type', currentType);
            
            try {
                const res = await fetch('/api/anime/ranking?' + params);
                const json = await res.json();
                if (json.code === 200 && json.data) {
                    renderRanking(list, json.data);
                }
            } catch(e) { list.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4)">加载失败</div>'; }
        }
        
        function renderRanking(container, records) {
            if (!records || !records.length) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4)">暂无数据</div>';
                return;
            }
            container.innerHTML = records.map((anime, i) => {
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-default';
                return `
                    <div class="ranking-item" onclick="window.location.href='/anime/detail?id=${anime.id}'">
                        <span class="rank-number ${rankClass}">${i + 1}</span>
                        <div class="rank-cover">
                            <img src="${anime.coverImage || ''}" onerror="this.parentElement.style.background='linear-gradient(135deg,#667eea,#764ba2)'">
                        </div>
                        <div class="rank-info">
                            <h4 class="rank-title">${anime.title}</h4>
                            <div class="rank-meta">
                                <span>${anime.type || ''}</span>
                                <span>${anime.status || ''}</span>
                                <span>${formatCount(anime.viewCount)}次观看</span>
                            </div>
                        </div>
                        <span class="rank-score">⭐ ${anime.rating || 0}</span>
                    </div>
                `;
            }).join('');
        }
        
        async function loadSidebarTops() {
            try {
                const [jp, cn, us] = await Promise.all([
                    fetch('/api/anime/ranking?type=日本&sortBy=rating&limit=3'),
                    fetch('/api/anime/ranking?type=国产&sortBy=rating&limit=3'),
                    fetch('/api/anime/ranking?type=欧美&sortBy=rating&limit=3')
                ]);
                const jpJson = await jp.json();
                const cnJson = await cn.json();
                const usJson = await us.json();
                
                if (jpJson.code === 200) renderSidebarTop('japaneseTop', jpJson.data);
                if (cnJson.code === 200) renderSidebarTop('chineseTop', cnJson.data);
                if (usJson.code === 200) renderSidebarTop('westernTop', usJson.data);
            } catch(e) { console.log('侧边栏加载失败'); }
        }
        
        function renderSidebarTop(id, records) {
            const container = document.getElementById(id);
            if (!records || !records.length) return;
            container.innerHTML = records.map((anime, i) => `
                <div class="sidebar-item" onclick="window.location.href='/anime/detail?id=${anime.id}'">
                    <span class="sidebar-rank">${i + 1}</span>
                    <div class="sidebar-cover">
                        <img src="${anime.coverImage || ''}" onerror="this.parentElement.style.background='linear-gradient(135deg,#667eea,#764ba2)'">
                    </div>
                    <div class="sidebar-info">
                        <div class="sidebar-title-text">${anime.title}</div>
                        <div class="sidebar-meta">⭐ ${anime.rating || 0} · ${formatCount(anime.viewCount)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.ranking-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.type === type);
            });
            loadRanking();
        }
        
        function formatCount(n) {
            if (!n) return '0';
            if (n >= 10000000) return (n/10000000).toFixed(1)+'千万';
            if (n >= 10000) return (n/10000).toFixed(1)+'万';
            return String(n);
        }
        
        function doSearch() {
            const kw = document.getElementById('searchInput').value.trim();
            if (!kw) return;
            window.location.href = '/anime/search?keyword=' + encodeURIComponent(kw);
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') doSearch(); });
        
        loadRanking();
        loadSidebarTops();
    </script>
</body>
</html>
